# ============================================================================
# VALIDATION RULES
# ============================================================================
validation:
  rules:
    database_first:
      - "ALL agent prompts MUST come from agentConfig table"
      - "NO hardcoded prompts, default values, or mock data"
      - "If data missing: return error, don't invent defaults"
      - "Variable replacement happens BEFORE LLM call"

    workspace_isolation:
      - "EVERY database query MUST filter by workspaceId"
      - "Pattern: `where: { workspaceId, ...otherFilters }`"
      - "Critical for multi-tenant security"
      - "NO cross-workspace data access"

    variable_replacement:
      - "{{PRODUCTS}}, {{CATEGORIES}}, {{OFFERS}} MUST be in Italian (base language)"
      - "Translation layer handles final translation to customer language"
      - "NEVER create translation mappings - LLM translates dynamically"
      - "ALL variables replaced BEFORE LLM call"

    link_token_system:
      - "Agents MUST use [LINK_xxx] tokens, NOT real URLs"
      - "LinkReplacementService replaces tokens AFTER Safety layer"
      - "Tokens MUST be time-limited (security)"
      - "URLs MUST include workspaceId and customerId in token"

    calling_functions:
      - "Router delegates via function calling (productSearchAgent, etc.)"
      - "Specialists can call OWN functions (e.g., addToCart)"
      - "Function execution via FunctionExecutor service"
      - "NO circular function calls"

    security:
      - "WhatsApp webhook MUST verify HMAC signature"
      - "All API calls MUST use authMiddleware + workspaceValidationMiddleware"
      - "Secure tokens MUST be time-limited (default: 24 hours)"
      - "Frontend MUST validate tokens before showing data"

    error_handling:
      - "ALWAYS log full error stack (never generic 'Error occurred')"
      - "Return proper HTTP status codes"
      - "User-facing errors MUST be translated to customer language"
      - "Safety layer blocks inappropriate content"

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================
agents:
  router:
    type: "ROUTER"
    order: 0
    temperature: 0.3
    max_tokens: 2048
    calling_functions:
      - "productSearchAgent"
      - "cartManagementAgent"
      - "orderTrackingAgent"
      - "customerSupportAgent"
      - "handlePushNotifications"
    variables:
      - "{{PRODUCTS}} (Italian)"
      - "{{CATEGORIES}} (Italian)"
      - "{{OFFERS}} (Italian)"
      - "{{SERVICES}} (Italian)"
      - "{{FAQS}} (Italian)"
      - "{{nome}}, {{email}}, {{discount}}, etc."
    multi_language: "IT/ES/PT/FR/EN (input + output)"

  product_search:
    type: "PRODUCT_SEARCH"
    order: 2
    temperature: 0.3
    max_tokens: 2048
    calling_functions:
      - "cartManagementAgent (ONLY - removed searchProducts)"
    variables:
      - "{{PRODUCTS}} (Italian - embedded in prompt)"
    features:
      - "Smart Parsing: extractGroupText + filterByGroupKeywords"
      - "Direct {{PRODUCTS}} variable (NO QueryAnalyzer)"

  cart_management:
    type: "CART_MANAGEMENT"
    order: 3
    temperature: 0.3
    max_tokens: 1024
    calling_functions:
      - "addToCart (generates [LINK_CART])"
      - "viewCart (generates [LINK_CART])"
      - "clearCart"

  order_tracking:
    type: "ORDER_TRACKING"
    order: 4
    temperature: 0.3
    max_tokens: 1024
    calling_functions:
      - "getOrders (generates [LINK_ORDERS])"
      - "getOrder (TODO #13 - not implemented)"
      - "trackOrder (TODO #13 - not implemented)"
      - "sendInvoice (TODO #13 - not implemented)"
      - "repeatLastOrder (generates [LINK_CART])"

  customer_support:
    type: "CUSTOMER_SUPPORT"
    order: 5
    temperature: 0.3
    max_tokens: 1024
    calling_functions:
      - "contactSupport"
    
    # 🚨 CRITICAL BEHAVIOR: contactSupport() disables chatbot
    contactSupport_behavior:
      trigger:
        - "Customer explicitly requests operator: 'voglio parlare con operatore'"
        - "Customer is frustrated: 'sono stufo', 'sempre danneggiato', 'pessimo servizio'"
        - "Customer has problem: 'rotto', 'difettoso', 'marcio', 'scaduto'"
      
      execution:
        file: "backend/src/application/agents/CustomerSupportAgentLLM.ts"
        line: 362
        action: |
          await this.prisma.customers.update({
            where: { id: context.customerId },
            data: { activeChatbot: false }  // ✅ DISABLES CHATBOT
          })
      
      effect:
        - "activeChatbot set to false in customers table"
        - "Returns sales agent info (name, email, phone)"
        - "Next customer message → webhook checks activeChatbot"
        - "If activeChatbot = false → NO LLM processing (early exit)"
        - "Message saved to DB but NO bot response sent"
        - "Operator sees message in ChatPage and responds manually"
      
      webhook_check:
        file: "backend/src/routes/webhooks/whatsapp.routes.ts"
        line: 607
        logic: |
          if (customer && !customer.activeChatbot) {
            // Save message to DB
            await messageRepository.saveMessage({ ... })
            // Return WITHOUT calling LLM
            return res.json({ message: null, chatbotDisabled: true })
          }
      
      reactivation:
        - "Operator can re-enable via ChatPage UI (toggle switch)"
        - "Update: PATCH /workspaces/:workspaceId/customers/:customerId { activeChatbot: true }"
        - "Once re-enabled → chatbot resumes normal operation"

  safety_translation:
    type: "SAFETY_TRANSLATION"
    order: 99
    temperature: 0.1
    max_tokens: 1024
    calling_functions:
      - "sendAlertEmail (TODO #13 - not implemented)"
    features:
      - "Inappropriate content detection"
      - "Multi-language translation (IT/ES/PT/FR/EN)"
      - "Preserve Italian product names"
      - "Keep [LINK_xxx] tokens unchanged"

