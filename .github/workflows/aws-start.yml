name: ▶️ Start AWS Infrastructure

on:
  workflow_dispatch: # Manual trigger only

jobs:
  start-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Start EC2 Instances
        run: |
          echo "▶️ Starting EC2 instances..."
          
          # Get instance IDs by tag
          APP_INSTANCE=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" "Name=instance-state-name,Values=stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          DB_INSTANCE=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-db-server" "Name=instance-state-name,Values=stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          # Start DB first (app needs it)
          if [ "$DB_INSTANCE" != "None" ]; then
            echo "Starting DB Server: $DB_INSTANCE"
            aws ec2 start-instances --instance-ids $DB_INSTANCE
            
            # Wait for DB to be running
            echo "Waiting for DB to start..."
            aws ec2 wait instance-running --instance-ids $DB_INSTANCE
            echo "✅ DB Server running"
          fi
          
          # Then start App
          if [ "$APP_INSTANCE" != "None" ]; then
            echo "Starting App Server: $APP_INSTANCE"
            aws ec2 start-instances --instance-ids $APP_INSTANCE
            
            # Wait for App to be running
            echo "Waiting for App to start..."
            aws ec2 wait instance-running --instance-ids $APP_INSTANCE
            echo "✅ App Server running"
          fi
          
          echo "✅ All instances started"

      - name: Wait for Services to be Ready
        run: |
          echo "⏳ Waiting for services to initialize (PM2, PostgreSQL)..."
          sleep 60
          
          # Get App Server public IP
          APP_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo "App Server IP: $APP_IP"
          
          # Health check
          for i in {1..10}; do
            if curl -f http://$APP_IP:3001/health 2>/dev/null; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          
          echo "⚠️ Backend health check failed, but instances are running"

      - name: Display Access Info
        run: |
          APP_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Infrastructure is UP and RUNNING"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🌐 Frontend:  https://echatbot.ai"
          echo "🔌 Backend:   https://api.echatbot.ai"
          echo "🖥️  Admin:     https://admin.echatbot.ai"
          echo ""
          echo "📡 App Server IP: $APP_IP"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify Slack (Optional)
        if: always()
        run: |
          echo "🔔 Send notification to Slack/Email if needed"
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"AWS Infrastructure started"}'
