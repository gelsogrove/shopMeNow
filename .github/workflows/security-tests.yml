name: 🔒 Safty Checks (REQUIRED)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Block merge if tests fail
  merge_group:
  # Allow manual execution from GitHub UI
  workflow_dispatch:

# Cancel in-progress runs when new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint & Type Check (NO DATABASE)
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: ./backend
        run: npm run lint

      - name: 🔍 Run TypeScript compiler
        working-directory: ./backend
        run: npx tsc --noEmit

  # Job 2: Unit Tests (NO DATABASE - Fast in-memory tests)
  unit-tests:
    name: 🧪 Unit Tests (Fast)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck # Run only if lint passes

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🧪 Run unit tests (NO DATABASE)
        working-directory: ./backend
        run: npm run test:unit
        # Fast in-memory tests - no database required

      - name: 📊 Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage
        continue-on-error: true

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false

