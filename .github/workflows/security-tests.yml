  # Job 4: Security Tests (CRITICAL - BLOCCA MERGE - NO DATABASE)
  security-tests:
    name: 🔒 Security Tests (REQUIRED)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests] # Run only if lint and unit tests pass
    environment: main

    env:
      # Database not needed - tests use mocks
      DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      JWT_EXPIRES_IN: 24h
      TOKEN_ENCRYPTION_KEY: ${{ secrets.CI_TOKEN_ENCRYPTION_KEY }}
      TOKEN_HMAC_KEY: ${{ secrets.CI_TOKEN_HMAC_KEY }}
      TOKEN_EXPIRATION: 1h
      NODE_ENV: test
      INTEGRATION_TEST: true
      # Admin credentials
      ADMIN_EMAIL: admin@echatbot.ai
      ADMIN_PASSWORD: test-venezia44
      # Frontend
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      # SMTP (test mode)
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: test@ethereal.email
      SMTP_PASS: test-password
      SMTP_FROM: noreply@echatbot.ai
      # OpenRouter
      OPENROUTER_API_KEY: ${{ secrets.CI_OPENROUTER_API_KEY }}
      # Server
      PORT: 3001

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🧪 Run Security Tests (NO DATABASE - Mocked)
        working-directory: ./backend
        run: |
          # Run only security tests that DON'T require database
          npm run test:security -- --testPathIgnorePatterns="security-basic|api-security-audit|whatsapp-message-security|hard-rate-limit-unit"
        # If ANY test fails → workflow fails → merge blocked

      - name: � Run Backend Security Config Tests
        working-directory: ./backend
        run: npm run test:security -- backend-security-config.test.ts
        # Crypto keys, env vars validation

      - name: �️ Run SQL Injection Protection Tests
        working-directory: ./backend
        run: npm run test:security -- sql-injection.test.ts
        # SQL injection attack patterns

      - name: 📊 Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage
        continue-on-error: true # Don't block on coverage, just report

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: security-tests
          fail_ci_if_error: false

  # Job 5: Security Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, integration-tests, security-tests]
    if: always() # Run even if tests fail

    steps:
      - name: 📊 Generate security summary
        run: |
          echo "## 🔒 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Integration Tests (LLM)
          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ **Integration Tests (LLM)**: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- LLM calling functions correctly" >> $GITHUB_STEP_SUMMARY
            echo "- OpenRouter integration working" >> $GITHUB_STEP_SUMMARY
            echo "- Calling Functions routing validated" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Integration Tests (LLM)**: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- LLM not calling functions correctly" >> $GITHUB_STEP_SUMMARY
            echo "- **MERGE BLOCKED**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Security Tests
          if [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "✅ **Security Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- All security tests passed" >> $GITHUB_STEP_SUMMARY
            echo "- Rate limiting enforced" >> $GITHUB_STEP_SUMMARY
            echo "- API authentication validated" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Security Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- One or more security tests failed" >> $GITHUB_STEP_SUMMARY
            echo "- **MERGE BLOCKED**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Lint & TypeCheck: ${{ needs.lint-and-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🤖 Integration Tests: ${{ needs.integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 Security Tests: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail workflow if critical tests failed
        if: needs.integration-tests.result != 'success' || needs.security-tests.result != 'success'
        run: |
          echo "🚨 CRITICAL TESTS FAILED - MERGE BLOCKED"
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration Tests (LLM) failed"
          fi
          if [ "${{ needs.security-tests.result }}" != "success" ]; then
            echo "❌ Security Tests failed"
          fi
          exit 1

# Branch Protection Rules (configure in GitHub):
# Settings → Branches → Branch protection rules → main
#
# ✅ Require status checks to pass before merging
#   - 🔍 Lint & Type Check
#   - 🤖 Integration Tests (REQUIRED) - LLM + Calling Functions
#   - 🔒 Security Tests (REQUIRED)
#
# ✅ Require branches to be up to date before merging
# ✅ Require conversation resolution before merging
# ✅ Do not allow bypassing the above settings (even admins!)
#
# CRITICAL: Integration tests verify that LLM calls Calling Functions correctly.
# If these fail, the prompt or LLM integration is broken → MERGE BLOCKED.
