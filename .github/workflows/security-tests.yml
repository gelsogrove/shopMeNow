name: 🔒 Safty Checks (REQUIRED)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Block merge if tests fail
  merge_group:
  # Allow manual execution from GitHub UI
  workflow_dispatch:

# Cancel in-progress runs when new commit pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint & Type Check (NO DATABASE)
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: ./backend
        run: npm run lint

      - name: 🔍 Run TypeScript compiler
        working-directory: ./backend
        run: npx tsc --noEmit

  # Job 2: Unit Tests (NO DATABASE - Fast in-memory tests)
  unit-tests:
    name: 🧪 Unit Tests (Fast)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck # Run only if lint passes

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🧪 Run unit tests (NO DATABASE)
        working-directory: ./backend
        run: npm run test:unit
        # Fast in-memory tests - no database required

      - name: 📊 Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage
        continue-on-error: true

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false

  # Job 3: Security Tests (CRITICAL - BLOCCA MERGE - Requires DB)
  security-tests:
    name: 🔒 Security Tests (REQUIRED)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests] # Run only if lint and unit tests pass

    services:
      # PostgreSQL for tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: shopme_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: shopme_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Test database connection
      DATABASE_URL: postgresql://shopme_test:test_password@localhost:5432/shopme_test
      JWT_SECRET: 7f3a8b2e9c1d4f6e8a7b3c9d2e5f1a4b6c8e3d7f9a2b5c8e1d4f7a3b6c9e2d5f8a1b4c7e3d6f9a2b5c8e1d4f7a3b6c9e2d5f8a1b4c7e3d6f9a2b5c8e1d4f7a3b6c9e2d5f8a1b4c7e3d6f9
      JWT_EXPIRES_IN: 24h
      TOKEN_ENCRYPTION_KEY: 3f7e2a9d8c1b5e4f6a2d8b3c9e7f1a5d4b8c2e6f3a9d7b1e5c8f4a2d6b9e3c7f1
      TOKEN_HMAC_KEY: 9e4f2b7a3c8d1e6f5a9b2c7e4d8f3a1b6c9e5d2f7a4b8c3e1d6f9a5b2c7e4d8f3
      TOKEN_EXPIRATION: 15m
      NODE_ENV: test
      INTEGRATION_TEST: true
      # Admin credentials
      ADMIN_EMAIL: admin@shopme.com
      ADMIN_PASSWORD: test-venezia44
      # Frontend
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      # SMTP (test mode)
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: test@ethereal.email
      SMTP_PASS: test-password
      SMTP_FROM: noreply@shopme.com
      # OpenRouter
      OPENROUTER_API_KEY: sk-or-v1-test-key-for-ci-integration-testing-purposes-only
      # WhatsApp
      WHATSAPP_API_URL: https://graph.facebook.com/v18.0
      WHATSAPP_VERIFY_TOKEN: test-verify-token-for-ci-min-20-chars
      WHATSAPP_APP_SECRET: test-app-secret-for-ci
      WHATSAPP_WEBHOOK_ENABLED: false
      WHATSAPP_SIGNATURE_VERIFICATION: false
      WHATSAPP_MAX_MESSAGES_PER_MINUTE_WORKSPACE: 100
      WHATSAPP_MAX_MESSAGES_PER_MINUTE_CUSTOMER: 10
      WHATSAPP_MAX_RETRY_ATTEMPTS: 3
      WHATSAPP_RETRY_DELAY_MS: 1000
      # Server
      PORT: 3001

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🗄️ Run Prisma migrations
        working-directory: ./backend
        run: npx prisma migrate deploy

      - name: 🌱 Seed test database
        working-directory: ./backend
        run: npm run seed

      - name: 🧪 Run ALL Security Tests
        working-directory: ./backend
        run: npm run test:security
        # If ANY test fails → workflow fails → merge blocked

      - name: 🔒 Run Hard Rate Limit Tests (CRITICAL)
        working-directory: ./backend
        run: npm run test:security -- hard-rate-limit-unit.test.ts
        # Test che 101° messaggio viene bloccato

      - name: 🔑 Run API Key Signature Tests
        working-directory: ./backend
        run: npm run test:security -- api-security-audit.test.ts
        # API security audit tests

      - name: 📊 Generate coverage report
        working-directory: ./backend
        run: npm run test:coverage
        continue-on-error: true # Don't block on coverage, just report

      - name: 📤 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: security-tests
          fail_ci_if_error: false

  # Job 4: Security Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, security-tests]
    if: always() # Run even if tests fail

    steps:
      - name: 📊 Generate security summary
        run: |
          echo "## 🔒 Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "✅ **Security Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- All security tests passed" >> $GITHUB_STEP_SUMMARY
            echo "- Rate limiting enforced" >> $GITHUB_STEP_SUMMARY
            echo "- API authentication validated" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Security Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- One or more security tests failed" >> $GITHUB_STEP_SUMMARY
            echo "- **MERGE BLOCKED**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Lint & TypeCheck: ${{ needs.lint-and-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Tests: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail workflow if security tests failed
        if: needs.security-tests.result != 'success'
        run: |
          echo "🚨 SECURITY TESTS FAILED - MERGE BLOCKED"
          exit 1

# Branch Protection Rules (configure in GitHub):
# Settings → Branches → Branch protection rules → main
#
# ✅ Require status checks to pass before merging
#   - 🔍 Lint & Type Check
#   - 🔒 Security Tests (REQUIRED)
#
# ✅ Require branches to be up to date before merging
# ✅ Require conversation resolution before merging
# ✅ Do not allow bypassing the above settings (even admins!)
