name: ▶️ Resume AWS (Full Restart)

on:
  workflow_dispatch:

jobs:
  resume-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Start DB Server First
        run: |
          echo "▶️ RESUMING AWS INFRASTRUCTURE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          DB_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-db-server" "Name=instance-state-name,Values=stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          if [ "$DB_ID" != "None" ]; then
            echo "▶️ Starting DB Server: $DB_ID"
            aws ec2 start-instances --instance-ids $DB_ID
            
            echo "⏳ Waiting for DB to be ready..."
            aws ec2 wait instance-running --instance-ids $DB_ID
            sleep 30
            echo "✅ DB Server running"
          fi

      - name: Start App Server
        run: |
          APP_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" "Name=instance-state-name,Values=stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          if [ "$APP_ID" != "None" ]; then
            echo "▶️ Starting App Server: $APP_ID"
            aws ec2 start-instances --instance-ids $APP_ID
            
            echo "⏳ Waiting for App to be ready..."
            aws ec2 wait instance-running --instance-ids $APP_ID
            sleep 60
            echo "✅ App Server running"
          fi

      - name: Health Check
        run: |
          APP_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo ""
          echo "🔍 Running health checks..."
          
          for i in {1..10}; do
            if curl -f http://$APP_IP:3001/health 2>/dev/null; then
              echo "✅ Backend is healthy!"
              break
            fi
            echo "Attempt $i/10..."
            sleep 10
          done

      - name: Summary
        run: |
          APP_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ INFRASTRUCTURE RESUMED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🌐 Access URLs:"
          echo "   Frontend:  https://echatbot.ai"
          echo "   Backend:   https://api.echatbot.ai"
          echo "   Admin:     https://admin.echatbot.ai"
          echo ""
          echo "📡 App Server IP: $APP_IP"
          echo ""
          echo "💰 Cost: ~€76/month (RUNNING)"
          echo ""
          echo "⏸️ To pause: Run 'Pause AWS' workflow"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
