name: 🛑 Stop AWS Infrastructure

on:
  workflow_dispatch: # Manual trigger only

jobs:
  stop-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Stop EC2 Instances
        run: |
          echo "🛑 Stopping EC2 instances..."
          
          # Get instance IDs by tag
          APP_INSTANCE=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-app-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          DB_INSTANCE=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=echatbot-db-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          # Stop instances
          if [ "$APP_INSTANCE" != "None" ]; then
            echo "Stopping App Server: $APP_INSTANCE"
            aws ec2 stop-instances --instance-ids $APP_INSTANCE
          fi
          
          if [ "$DB_INSTANCE" != "None" ]; then
            echo "Stopping DB Server: $DB_INSTANCE"
            aws ec2 stop-instances --instance-ids $DB_INSTANCE
          fi
          
          echo "✅ EC2 instances stopped"
          echo "💰 Saving ~€23/month while stopped"

      - name: Notify Slack (Optional)
        if: always()
        run: |
          echo "🔔 Send notification to Slack/Email if needed"
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"AWS Infrastructure stopped"}'
