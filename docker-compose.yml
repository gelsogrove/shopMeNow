services:
  # 🗄️ DATABASE - PostgreSQL
  postgres:
    image: postgres:latest
    container_name: shop_db
    restart: always
    environment:
      - POSTGRES_USER=shopmefy
      - POSTGRES_PASSWORD=shopmefy
      - POSTGRES_DB=shopmefy
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopme_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopmefy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 🤖 LOCAL LLM - Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: shop_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - shopme_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  shopme_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
