services:
  # 🗄️ DATABASE - PostgreSQL
  postgres:
    image: postgres:latest
    container_name: shop_db
    restart: always
    environment:
      - POSTGRES_USER=echatbotfy
      - POSTGRES_PASSWORD=echatbotfy
      - POSTGRES_DB=echatbotfy
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - echatbot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echatbotfy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  echatbot_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
