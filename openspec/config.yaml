schema: spec-driven

# Project context (optional)
# Shown to the AI every time it creates an artifact (proposal, design, tasks, specs).
# Source of truth lives elsewhere — do NOT duplicate it here, just point to it.
context: |
  eChatbot — WhatsApp multi-tenant e-commerce platform with AI chatbot.
  Stack: Node.js/Express + React/TypeScript + PostgreSQL + Prisma + OpenRouter.

  Source of truth (read and obey these — do not restate them in artifacts):
  - CLAUDE.md  → the project's non-negotiable rules (database-first, workspace
    isolation, 3-layer security, no-patch-in-prompt, no hardcoded detection, etc.)
  - docs/memory-bank/PRD.md → product specs.

# Per-artifact rules (optional)
# ONLY rules that shape the OpenSpec artifact itself — not project rules
# (those already live in CLAUDE.md).
rules:
  proposal:
    - State the problem and the why before the how.
    - Reference the relevant PRD section when applicable.
    - Include a "Non-goals" section to bound the change.
  design:
    - Trace the change across the full stack (FE -> API -> service -> repository -> DB).
  tasks:
    - Break work into small, independently verifiable steps.
    - Include a task to add/update unit tests (test:unit only — never integration).
    - Include a task to update swagger.yaml whenever an API endpoint changes.
    - Do NOT include git add/commit/push steps — Andrea does those manually.
    - The FINAL task of every change is: run `npm run test:unit`, and only if it
      passes, run `npm run publish` (Heroku production deploy). If tests fail,
      stop and do NOT deploy.
