# Netlify Configuration for React SPA
[build]
  base = "apps/frontend"
  command = "npm run build"
  publish = "dist"
  environment = { VITE_API_URL = "https://www.echatbot.ai/api/v1" }

# API Proxy: Forward API calls to Heroku backend
[[redirects]]
  from = "/api/*"
  to = "https://echatbot-app-1cba28556df2.herokuapp.com/api/:splat"
  status = 200
  force = true

# SPA Redirect: All routes should serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.openrouter.ai https://accounts.google.com https://*.googleapis.com https://*.gstatic.com; frame-src https://accounts.google.com;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
